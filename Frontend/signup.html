<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toggle-btn" onclick="toggleMode()">🌙</div>

<!-- 🔐 Already logged in redirect -->
<script>
if (localStorage.getItem("token")) {
  window.location = "dashboard.html";
}
</script>

<!-- 🌌 BACKGROUND -->
<canvas id="bgCanvas"></canvas>

<!-- 🔥 HEADING -->
<div class="hero">
  <h1 class="title">
    <span>S</span><span>M</span><span>A</span><span>R</span><span>T</span>
    <span> </span>
    <span>S</span><span>T</span><span>U</span><span>D</span><span>E</span><span>N</span><span>T</span>
    <span> </span>
    <span>H</span><span>U</span><span>B</span>
  </h1>
</div>

<!-- 🌙 DARK MODE -->
<div class="toggle-btn" onclick="toggleMode()">🌙</div>

<!-- ✅ SIGNUP FORM -->
<div class="container">
  <h2>Signup</h2>

  <input id="name" placeholder="Enter Name">

  <input id="email" placeholder="Enter ID">

  <div style="position: relative;">
    <input id="password" type="password" placeholder="Enter Password">
    <span onclick="togglePassword()" style="position:absolute; right:10px; top:12px; cursor:pointer;">
      👁️
    </span>
  </div>

  <button onclick="signup()">Signup</button>

  <a href="index.html">Already have account? Login</a>
</div>

<!-- 🔔 TOAST -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
